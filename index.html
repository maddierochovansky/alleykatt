<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>alleykaTT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--white:#f2f0eb;--black:#080808;--ink:#141414;--muted:#aaa8a2;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--white);cursor:none;}

    #cursor{
      position:fixed;width:6px;height:6px;background:var(--ink);
      border-radius:50%;pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);mix-blend-mode:multiply;
    }

    #canvas{position:fixed;inset:0;width:100%;height:100%;z-index:50;pointer-events:none;}

    #stage{
      position:fixed;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:5;
    }

    #logo{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(4rem,13vw,11rem);
      letter-spacing:0.08em;
      color:var(--ink);
      opacity:0;user-select:none;line-height:1;
      transition:opacity 1.4s cubic-bezier(0.16,1,0.3,1),
                 transform 1.6s cubic-bezier(0.16,1,0.3,1);
      transform:scale(0.94);
    }
    #logo.reveal{opacity:1;transform:scale(1);}

    #tagline{
      margin-top:0.9rem;
      font-family:'Space Mono',monospace;
      font-size:clamp(0.45rem,0.9vw,0.62rem);
      letter-spacing:0.6em;color:var(--muted);
      text-transform:uppercase;opacity:0;
      transition:opacity 1.2s ease 0.6s;
    }
    #tagline.reveal{opacity:1;}

    #done{
      position:fixed;inset:0;background:var(--black);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:20;opacity:0;pointer-events:none;
      transition:opacity 1.2s ease;
    }
    #done.visible{opacity:1;pointer-events:all;}

    .d-eye{
      font-family:'Space Mono',monospace;
      font-size:clamp(0.4rem,.75vw,.55rem);
      letter-spacing:.7em;color:#2e2e2e;
      text-transform:uppercase;margin-bottom:2rem;
    }
    .d-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(3rem,9vw,8rem);
      letter-spacing:.1em;color:var(--white);
      text-align:center;line-height:1;
    }
    .d-rule{width:36px;height:1px;background:#222;margin:2.4rem auto;}
    .d-sub{
      font-family:'Space Mono',monospace;
      font-size:clamp(.4rem,.7vw,.54rem);
      letter-spacing:.5em;color:#2e2e2e;text-transform:uppercase;
    }
    .d-foot{
      position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);
      font-family:'Space Mono',monospace;
      font-size:.48rem;letter-spacing:.44em;
      color:#1a1a1a;text-transform:uppercase;white-space:nowrap;
    }

    .noise{
      position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:160px;
    }
  </style>
</head>
<body>
<div class="noise"></div>
<div id="cursor"></div>

<div id="stage">
  <h1 id="logo">alleykaTT</h1>
  <p id="tagline">Skate — Est. 2025</p>
</div>

<canvas id="canvas"></canvas>

<div id="done">
  <p class="d-eye">alleykaTT skate co.</p>
  <h2 class="d-title">Still<br>Building.</h2>
  <div class="d-rule"></div>
  <p class="d-sub">Check back soon</p>
  <p class="d-foot">© alleykaTT 2025 &nbsp;—&nbsp; the flock is watching</p>
</div>

<script>
/* ── cursor ── */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

/* ── canvas ── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; buildSprites(); }
window.addEventListener('resize', resize);

707.21875 832.390625 1707.21875 840.890625 1724.21875 827.761719 C 1741.210938 814.621094 1771.339844 796.078125 1771.339844 796.078125 C 1771.339844 796.078125 1742.761719 840.890625 1725.761719 848.609375 C 1725.761719 848.609375 1803.789062 847.839844 1829.28125 833.941406 C 1829.28125 833.941406 1816.148438 861.75 1793.738281 869.46875 C 1793.738281 869.46875 1874.089844 884.921875 1900.351562 877.96875 C 1900.351562 877.96875 1866.359375 904.238281 1841.640625 908.101562 C 1816.921875 911.960938 1788.339844 911.960938 1788.339844 911.960938 C 1788.339844 911.960938 1864.820312 927.410156 1881.039062 937.460938 C 1881.039062 937.460938 1827.738281 956 1779.839844 956 C 1779.839844 956 1831.601562 997.710938 1865.589844 999.261719 C 1865.589844 999.261719 1789.109375 1022.441406 1735.800781 1013.171875 C 1735.800781 1013.171875 1796.058594 1048.699219 1822.328125 1055.660156 C 1822.328125 1055.660156 1738.890625 1078.058594 1715.71875 1068.789062 L 1735.800781 1091.960938 C 1735.800781 1091.960938 1697.179688 1105.097656 1672.460938 1095.828125 L 1670.140625 1109.734375 C 1670.140625 1109.734375 1647.730469 1122.09375 1630.738281 1114.367188 L 1629.960938 1132.910156 C 1629.960938 1132.910156 1609.109375 1144.496094 1592.878906 1138.316406 L 1585.308594 1149.628906 L 1554.160156 1144.1875 L 1544.28125 1151.109375 L 1523.011719 1151.109375 L 1519.058594 1159.515625 L 1501.75 1157.042969 L 1497.300781 1166.4375 L 1475.550781 1158.03125 L 1461.710938 1160.011719 L 1456.761719 1173.855469 L 1435.988281 1158.527344 L 1425.121094 1160.503906 L 1419.679688 1167.921875 L 1403.359375 1160.503906 L 1385.070312 1163.472656 L 1367.269531 1161.988281 L 1348.480469 1167.921875 L 1337.109375 1158.527344 L 1319.308594 1161.492188 L 1303.980469 1155.066406 L 1279.761719 1155.5625 L 1279.261719 1149.628906 L 1252.558594 1151.109375 L 1252.558594 1145.671875 L 1223.890625 1145.671875 L 1223.890625 1139.738281 L 1203.621094 1143.199219 L 1206.089844 1132.320312 L 1188.78125 1138.257812 L 1186.308594 1128.367188 L 1166.53125 1128.367188 L 1170.980469 1121.445312 L 1148.730469 1122.929688 L 1149.71875 1114.027344 L 1142.800781 1112.050781 L 1137.359375 1103.644531 L 1131.921875 1104.140625 L 1126.980469 1099.199219 L 1114.121094 1094.75 L 1124.011719 1113.039062 L 1134.390625 1133.3125 C 1134.390625 1133.3125 1173.460938 1198.082031 1208.058594 1219.835938 C 1208.058594 1219.835938 1195.210938 1233.183594 1167.03125 1206.484375 C 1167.03125 1206.484375 1169.988281 1222.800781 1175.929688 1238.625 C 1181.859375 1254.445312 1149.230469 1249.5 1139.339844 1237.140625 C 1139.339844 1237.140625 1133.898438 1255.929688 1134.890625 1274.222656 L 1110.660156 1274.222656 C 1110.660156 1274.222656 1102.75 1282.132812 1104.238281 1292.515625 C 1104.238281 1292.515625 1081 1292.515625 1071.601562 1282.628906 L 1057.28125 1294.75 L 1050 1303.917969 L 1042.71875 1294.75`;

// Bird bounding box in SVG space (approx, from path analysis)
// wings spread: x ~200..1900, y ~800..1305, center ~1050, 1050
const SVG_W = 2100, SVG_H = 2100;
const BIRD_CX = 1050, BIRD_CY = 1052; // visual center of bird
const BIRD_W  = 1700, BIRD_H  = 505;  // rough bounding box of bird shape

// Sprite sizes we'll render (in px) — bigger = more detail
const SPRITE_SIZE = 80; // rendered width of each sprite
const SPRITE_H    = Math.round(SPRITE_SIZE * (BIRD_H / BIRD_W));

// We animate wing flapping by scaling Y of the wings around body center.
// Pre-render N keyframes
const NUM_FRAMES = 12;
const sprites    = []; // array of offscreen canvases

function buildSprites(){
  sprites.length = 0;
  for(let f = 0; f < NUM_FRAMES; f++){
    const angle = (f / NUM_FRAMES) * Math.PI * 2;
    // wingY scale: 1 = flat (SVG pose), >1 = wings down, <1 = wings up
    const flapY = 1 + Math.sin(angle) * 0.55; // 0.45 up .. 1.55 down

    const oc  = document.createElement('canvas');
    oc.width  = SPRITE_SIZE + 4;
    oc.height = SPRITE_SIZE + 4;
    const oc2 = oc.getContext('2d');

    // Scale the SVG path so the bird fills SPRITE_SIZE width
    const scaleX = SPRITE_SIZE / BIRD_W;
    const scaleY = scaleX; // uniform base scale

    oc2.save();
    // translate so bird center maps to sprite center
    oc2.translate(
      (SPRITE_SIZE + 4) / 2 - BIRD_CX * scaleX,
      (SPRITE_SIZE + 4) / 2 - BIRD_CY * scaleY
    );
    oc2.scale(scaleX, scaleY);

    // Apply wing flap: scale Y around body center
    // We do this by shifting to bird center, scaling, shifting back
    oc2.translate(BIRD_CX, BIRD_CY);
    oc2.scale(1, flapY);
    oc2.translate(-BIRD_CX, -BIRD_CY);

    const p = new Path2D(BIRD_PATH);
    oc2.fillStyle = '#0d0d0d';
    oc2.fill(p, 'evenodd');
    oc2.restore();

    sprites.push(oc);
  }
}

/* ─────────────────────────────────────────────
   TIMELINE
   0        – 800ms   : white silence (short)
   800ms    – 5s      : crows flood in from edges
   5s       – 9.5s    : flock swarms / spirals logo center
   9.5s     – 11s     : crows scatter outward
   11s                : logo reveals
   13s                : dark screen
───────────────────────────────────────────── */
const T_FLOOD   =  800;
const T_SWARM   = 5000;
const T_SCATTER = 9500;
const T_REVEAL  = 11000;
const T_DARK    = 13500;

let startTime = null;
let logoShown = false;
let darkShown = false;

let logoTarget = { x: 0, y: 0 };
function updateLogoTarget(){
  logoTarget.x = innerWidth  / 2;
  logoTarget.y = innerHeight / 2;
}

/* ─────────────────────────────────────────────
   CROW
───────────────────────────────────────────── */
class Crow {
  constructor(idx, total){
    this.idx     = idx;
    this.sz      = 0.55 + Math.random() * 0.7; // scale multiplier on sprite
    this.maxSpd  = 1.1 + Math.random() * 1.5;
    this.flapT   = Math.random() * Math.PI * 2;
    this.flapF   = 0.06 + Math.random() * 0.07; // flap frequency
    this.active  = false;
    this.opacity = 0;
    this.delay   = T_FLOOD + idx * 35 + Math.random() * 150;
    // orbit params
    this.orbitR   = 55 + Math.random() * 200;
    this.orbitSpd = (0.003 + Math.random() * 0.005) * (Math.random()<.5?1:-1);
    this.orbitOff = Math.random() * Math.PI * 2;
    this.vx = 0; this.vy = 0;
    this.x  = 0; this.y  = 0;
    this._spawn();
  }

  _spawn(){
    const side = this.idx % 4;
    const W = canvas.width, H = canvas.height;
    if      (side===0){ this.x = Math.random()*W; this.y = -60; }
    else if (side===1){ this.x = W+60;             this.y = Math.random()*H; }
    else if (side===2){ this.x = Math.random()*W; this.y = H+60; }
    else              { this.x = -60;              this.y = Math.random()*H; }
    const a = Math.random()*Math.PI*2;
    this.vx = Math.cos(a)*this.maxSpd;
    this.vy = Math.sin(a)*this.maxSpd;
  }

  update(elapsed, flock){
    if(!this.active){
      if(elapsed >= this.delay) this.active = true;
      else return;
    }
    if(this.opacity < 1) this.opacity = Math.min(1, this.opacity + 0.022);
    this.flapT += this.flapF;

    if(elapsed < T_SWARM){
      /* FLOOD: loose drift toward screen center */
      const cx = canvas.width/2, cy = canvas.height/2;
      const dx = cx-this.x, dy = cy-this.y;
      const d  = Math.sqrt(dx*dx+dy*dy)||1;
      this.vx += (dx/d)*0.005*this.maxSpd;
      this.vy += (dy/d)*0.005*this.maxSpd;
      this._sep(flock, 46, 0.10);
      this._cap(this.maxSpd);

    } else if(elapsed < T_SCATTER){
      /* SWARM: orbit tightening toward logo */
      const prog = Math.min(1,(elapsed-T_SWARM)/(T_SCATTER-T_SWARM));
      this.orbitOff += this.orbitSpd * (1 + prog * 1.5);
      const r  = this.orbitR * (1 - prog * 0.72);
      const ox = logoTarget.x + Math.cos(this.orbitOff)*r;
      const oy = logoTarget.y + Math.sin(this.orbitOff)*r;
      const dx = ox-this.x, dy = oy-this.y;
      const d  = Math.sqrt(dx*dx+dy*dy)||1;
      const pull = 0.06 + prog*0.10;
      this.vx += (dx/d)*pull*this.maxSpd;
      this.vy += (dy/d)*pull*this.maxSpd;
      this._sep(flock, 22, 0.07);
      this._cap(this.maxSpd * 1.6);

    } else {
      /* SCATTER: explode outward */
      const dx = this.x-logoTarget.x;
      const dy = this.y-logoTarget.y;
      const d  = Math.sqrt(dx*dx+dy*dy)||1;
      this.vx += (dx/d)*0.22*this.maxSpd;
      this.vy += (dy/d)*0.22*this.maxSpd;
      this._cap(this.maxSpd*3);
      const dist = Math.sqrt((this.x-logoTarget.x)**2+(this.y-logoTarget.y)**2);
      this.opacity = Math.max(0, 1-(dist/(Math.max(canvas.width,canvas.height)*0.6)));
    }

    this.x += this.vx;
    this.y += this.vy;

    // soft wrap only during flood
    if(elapsed < T_SWARM){
      const pad=100;
      if(this.x<-pad)this.x=canvas.width+pad;
      if(this.x>canvas.width+pad)this.x=-pad;
      if(this.y<-pad)this.y=canvas.height+pad;
      if(this.y>canvas.height+pad)this.y=-pad;
    }
  }

  _sep(flock, r, f){
    for(const o of flock){
      if(o===this||!o.active)continue;
      const ex=this.x-o.x, ey=this.y-o.y;
      const ed=Math.sqrt(ex*ex+ey*ey)||1;
      if(ed<r){this.vx+=(ex/ed)*f;this.vy+=(ey/ed)*f;}
    }
  }

  _cap(max){
    const s=Math.sqrt(this.vx*this.vx+this.vy*this.vy)||1;
    if(s>max){this.vx=(this.vx/s)*max;this.vy=(this.vy/s)*max;}
  }

  draw(){
    if(!this.active||this.opacity<=0||sprites.length===0)return;

    // pick sprite frame based on flap cycle
    const frameIdx = Math.floor(
      ((this.flapT % (Math.PI*2)) / (Math.PI*2)) * NUM_FRAMES
    ) % NUM_FRAMES;
    const sp = sprites[frameIdx];

    const angle = Math.atan2(this.vy, this.vx);
    const sw    = sp.width  * this.sz;
    const sh    = sp.height * this.sz;

    ctx.save();
    ctx.globalAlpha = this.opacity * 0.9;
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);
    // draw bird centered, facing right (direction of travel)
    ctx.drawImage(sp, -sw/2, -sh/2, sw, sh);
    ctx.restore();
  }
}

/* ─────────────────────────────────────────────
   INIT + LOOP
───────────────────────────────────────────── */
canvas.width = innerWidth; canvas.height = innerHeight;
updateLogoTarget();
buildSprites();
window.addEventListener('resize', () => { updateLogoTarget(); resize(); });

const N     = 85;
const flock = Array.from({length:N}, (_,i) => new Crow(i, N));

function loop(ts){
  if(!startTime) startTime = ts;
  const elapsed = ts - startTime;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  flock.forEach(c => { c.update(elapsed, flock); c.draw(); });

  if(!logoShown && elapsed >= T_REVEAL){
    logoShown = true;
    document.getElementById('logo').classList.add('reveal');
    document.getElementById('tagline').classList.add('reveal');
  }

  if(!darkShown && elapsed >= T_DARK){
    darkShown = true;
    document.getElementById('done').classList.add('visible');
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
