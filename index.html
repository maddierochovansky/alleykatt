<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>alleykaTT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--white:#f2f0eb;--black:#080808;--ink:#141414;--muted:#aaa8a2;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--white);cursor:none;}
    #cursor{position:fixed;width:6px;height:6px;background:var(--ink);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;}
    #canvas{position:fixed;inset:0;width:100%;height:100%;z-index:50;pointer-events:none;}
    #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;}
    #logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,13vw,11rem);letter-spacing:0.08em;color:var(--ink);opacity:0;user-select:none;line-height:1;transition:opacity 1.4s cubic-bezier(0.16,1,0.3,1),transform 1.6s cubic-bezier(0.16,1,0.3,1);transform:scale(0.94);}
    #logo.reveal{opacity:1;transform:scale(1);}
    #tagline{margin-top:0.9rem;font-family:'Space Mono',monospace;font-size:clamp(0.45rem,0.9vw,0.62rem);letter-spacing:0.6em;color:var(--muted);text-transform:uppercase;opacity:0;transition:opacity 1.2s ease 0.6s;}
    #tagline.reveal{opacity:1;}
    #done{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity 1.2s ease;}
    #done.visible{opacity:1;pointer-events:all;}
    .d-eye{font-family:'Space Mono',monospace;font-size:clamp(0.4rem,.75vw,.55rem);letter-spacing:.7em;color:#2e2e2e;text-transform:uppercase;margin-bottom:2rem;}
    .d-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,8rem);letter-spacing:.1em;color:var(--white);text-align:center;line-height:1;}
    .d-rule{width:36px;height:1px;background:#222;margin:2.4rem auto;}
    .d-sub{font-family:'Space Mono',monospace;font-size:clamp(.4rem,.7vw,.54rem);letter-spacing:.5em;color:#2e2e2e;text-transform:uppercase;}
    .d-foot{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.44em;color:#1a1a1a;text-transform:uppercase;white-space:nowrap;}
    .noise{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;}
  </style>
</head>
<body>
<div class="noise"></div>
<div id="cursor"></div>
<div id="stage">
  <h1 id="logo">alleykaTT</h1>
  <p id="tagline">Skate — Est. 2025</p>
</div>
<canvas id="canvas"></canvas>
<div id="done">
  <p class="d-eye">alleykaTT skate co.</p>
  <h2 class="d-title">Still<br>Building.</h2>
  <div class="d-rule"></div>
  <p class="d-sub">Check back soon</p>
  <p class="d-foot">© alleykaTT 2025 — the flock is watching</p>
</div>
<script>
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth; canvas.height = innerHeight;
window.addEventListener('resize', ()=>{ canvas.width=innerWidth; canvas.height=innerHeight; logoTarget.x=innerWidth/2; logoTarget.y=innerHeight/2; });

const T_FLOOD=800, T_SWARM=5000, T_SCATTER=9500, T_REVEAL=11000, T_DARK=13500;
let startTime=null, logoShown=false, darkShown=false;
const logoTarget = { x: innerWidth/2, y: innerHeight/2 };

function drawSperm(ctx, x, y, size, angle, wiggleT){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const s = size;

  // ── HEAD: rounded oval, slightly pointed at front
  ctx.beginPath();
  ctx.ellipse(s*0.1, 0, s*0.52, s*0.32, 0.18, 0, Math.PI*2);
  ctx.fillStyle = '#111';
  ctx.fill();

  // ── MIDPIECE: short thick connector
  ctx.beginPath();
  ctx.ellipse(-s*0.55, 0, s*0.22, s*0.14, 0, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a1a';
  ctx.fill();

  // ── TAIL: sinuous wave, 3 segments that wiggle
  const w1 = Math.sin(wiggleT)        * s * 0.28;
  const w2 = Math.sin(wiggleT + 1.8)  * s * 0.38;
  const w3 = Math.sin(wiggleT + 3.4)  * s * 0.32;
  const w4 = Math.sin(wiggleT + 5.0)  * s * 0.18;

  ctx.beginPath();
  ctx.moveTo(-s*0.68, 0);
  ctx.bezierCurveTo(
    -s*1.1,  w1,
    -s*1.7,  w2,
    -s*2.3,  w3
  );
  ctx.bezierCurveTo(
    -s*2.9,  w2 * 0.6,
    -s*3.5,  w4,
    -s*4.2,  w4 * 0.5
  );
  ctx.strokeStyle = '#111';
  ctx.lineWidth = s * 0.13;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // thinner tip
  ctx.beginPath();
  ctx.moveTo(-s*4.2, w4*0.5);
  ctx.bezierCurveTo(
    -s*4.8, w4*0.3,
    -s*5.4, w3*0.2,
    -s*6.0, 0
  );
  ctx.lineWidth = s * 0.055;
  ctx.stroke();

  ctx.restore();
}

class Cell {
  constructor(idx){
    this.idx=idx; this.sz=3+Math.random()*5;
    this.maxSpd=1.0+Math.random()*1.4;
    this.wigT=Math.random()*Math.PI*2;
    this.wigF=0.08+Math.random()*0.07;
    this.active=false; this.opacity=0;
    this.delay=T_FLOOD+idx*35+Math.random()*150;
    this.orbitR=55+Math.random()*200;
    this.orbitSpd=(0.003+Math.random()*0.005)*(Math.random()<.5?1:-1);
    this.orbitOff=Math.random()*Math.PI*2;
    this.vx=0;this.vy=0;this.x=0;this.y=0;
    this._spawn();
  }
  _spawn(){
    const side=this.idx%4, W=canvas.width, H=canvas.height;
    if(side===0){this.x=Math.random()*W;this.y=-60;}
    else if(side===1){this.x=W+60;this.y=Math.random()*H;}
    else if(side===2){this.x=Math.random()*W;this.y=H+60;}
    else{this.x=-60;this.y=Math.random()*H;}
    const a=Math.random()*Math.PI*2;
    this.vx=Math.cos(a)*this.maxSpd; this.vy=Math.sin(a)*this.maxSpd;
  }
  update(elapsed, flock){
    if(!this.active){if(elapsed>=this.delay)this.active=true;else return;}
    if(this.opacity<1)this.opacity=Math.min(1,this.opacity+0.022);
    this.wigT+=this.wigF;
    if(elapsed<T_SWARM){
      const dx=canvas.width/2-this.x, dy=canvas.height/2-this.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=(dx/d)*0.005*this.maxSpd; this.vy+=(dy/d)*0.005*this.maxSpd;
      this._sep(flock,46,0.10); this._cap(this.maxSpd);
    } else if(elapsed<T_SCATTER){
      const prog=Math.min(1,(elapsed-T_SWARM)/(T_SCATTER-T_SWARM));
      this.orbitOff+=this.orbitSpd*(1+prog*1.5);
      const r=this.orbitR*(1-prog*0.72);
      const ox=logoTarget.x+Math.cos(this.orbitOff)*r;
      const oy=logoTarget.y+Math.sin(this.orbitOff)*r;
      const dx=ox-this.x, dy=oy-this.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=(dx/d)*(0.06+prog*0.10)*this.maxSpd;
      this.vy+=(dy/d)*(0.06+prog*0.10)*this.maxSpd;
      this._sep(flock,22,0.07); this._cap(this.maxSpd*1.6);
    } else {
      const dx=this.x-logoTarget.x, dy=this.y-logoTarget.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=(dx/d)*0.22*this.maxSpd; this.vy+=(dy/d)*0.22*this.maxSpd;
      this._cap(this.maxSpd*3);
      this.opacity=Math.max(0,1-(Math.sqrt(dx*dx+dy*dy)/(Math.max(canvas.width,canvas.height)*0.6)));
    }
    this.x+=this.vx; this.y+=this.vy;
    if(elapsed<T_SWARM){
      const p=100;
      if(this.x<-p)this.x=canvas.width+p; if(this.x>canvas.width+p)this.x=-p;
      if(this.y<-p)this.y=canvas.height+p; if(this.y>canvas.height+p)this.y=-p;
    }
  }
  _sep(flock,r,f){for(const o of flock){if(o===this||!o.active)continue;const ex=this.x-o.x,ey=this.y-o.y,ed=Math.sqrt(ex*ex+ey*ey)||1;if(ed<r){this.vx+=(ex/ed)*f;this.vy+=(ey/ed)*f;}}}
  _cap(max){const s=Math.sqrt(this.vx*this.vx+this.vy*this.vy)||1;if(s>max){this.vx=(this.vx/s)*max;this.vy=(this.vy/s)*max;}}
  draw(){
    if(!this.active||this.opacity<=0)return;
    ctx.save();
    ctx.globalAlpha=this.opacity*0.88;
    drawSperm(ctx, this.x, this.y, this.sz, Math.atan2(this.vy,this.vx), this.wigT);
    ctx.restore();
  }
}

const flock = Array.from({length:85},(_,i)=>new Cell(i));

function loop(ts){
  if(!startTime)startTime=ts;
  const elapsed=ts-startTime;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  flock.forEach(c=>{c.update(elapsed,flock);c.draw();});
  if(!logoShown&&elapsed>=T_REVEAL){logoShown=true;document.getElementById('logo').classList.add('reveal');document.getElementById('tagline').classList.add('reveal');}
  if(!darkShown&&elapsed>=T_DARK){darkShown=true;document.getElementById('done').classList.add('visible');}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
